<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D-AI Lab</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: dark;
        --bg: #101318;
        --panel: #171c22;
        --panel-strong: #202833;
        --text: #f2f5f7;
        --muted: #a9b3bd;
        --line: #364250;
        --accent: #45c4a0;
        --accent-strong: #2ea783;
        --danger: #ff7a7a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .app-shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        height: 100vh;
      }

      .stage {
        position: relative;
        min-width: 0;
        background: #0d1116;
      }

      #scene {
        display: block;
        width: 100%;
        height: 100%;
      }

      .bubble {
        position: absolute;
        left: 50%;
        top: 18%;
        width: min(420px, calc(100% - 48px));
        min-height: 64px;
        padding: 14px 16px;
        transform: translateX(-50%);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(246, 250, 252, 0.92);
        color: #182026;
        font-size: 15px;
        line-height: 1.55;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
      }

      .bubble::after {
        position: absolute;
        left: 50%;
        bottom: -10px;
        width: 18px;
        height: 18px;
        content: "";
        transform: translateX(-50%) rotate(45deg);
        background: rgba(246, 250, 252, 0.92);
        border-right: 1px solid rgba(255, 255, 255, 0.18);
        border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      }

      .chat-panel {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
        min-width: 0;
        border-left: 1px solid var(--line);
        background: var(--panel);
      }

      .chat-header {
        padding: 18px 18px 14px;
        border-bottom: 1px solid var(--line);
      }

      .chat-header h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .chat-header p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .chat-log {
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
        padding: 16px;
        overflow-y: auto;
      }

      .simulation-panel {
        display: grid;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: #131820;
      }

      .simulation-panel h2 {
        margin: 0;
        font-size: 15px;
      }

      .simulation-title-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 150px;
        gap: 10px;
        align-items: center;
      }

      .simulation-title-row select {
        min-width: 0;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 9px;
        background: #0f141b;
        color: var(--text);
        font-size: 13px;
        outline: none;
      }

      .parameter-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 5px;
      }

      .field label {
        color: var(--muted);
        font-size: 12px;
      }

      .field input,
      .field select {
        min-width: 0;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 10px;
        background: #0f141b;
        color: var(--text);
        font-size: 14px;
        outline: none;
      }

      .field input:focus,
      .field select:focus {
        border-color: var(--accent);
      }

      .simulation-actions {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }

      .simulation-actions button,
      .run-button {
        min-width: 0;
        height: 36px;
        border: 0;
        border-radius: 8px;
        padding: 0 10px;
        background: var(--panel-strong);
        color: var(--text);
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
      }

      .run-button {
        background: var(--accent);
        color: #07110e;
      }

      .simulation-actions button:disabled,
      .run-button:disabled {
        cursor: wait;
        opacity: 0.58;
      }

      .simulation-status {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
        min-height: 38px;
      }

      .simulation-note {
        border: 1px solid rgba(69, 196, 160, 0.24);
        border-radius: 8px;
        padding: 10px;
        background: rgba(69, 196, 160, 0.08);
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .maze-controls {
        display: grid;
        gap: 10px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 32px;
        color: var(--muted);
        font-size: 13px;
      }

      .toggle-row input {
        width: 16px;
        height: 16px;
        accent-color: var(--accent);
      }

      [hidden] {
        display: none !important;
      }

      .message {
        max-width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        line-height: 1.5;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }

      .message.student {
        align-self: flex-end;
        background: #263e4b;
      }

      .message.assistant {
        align-self: flex-start;
        background: var(--panel-strong);
      }

      .message.error {
        align-self: stretch;
        border: 1px solid rgba(255, 122, 122, 0.35);
        background: rgba(255, 122, 122, 0.12);
        color: var(--danger);
      }

      .chat-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        padding: 14px;
        border-top: 1px solid var(--line);
        background: #131820;
      }

      .chat-form input {
        min-width: 0;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: #0f141b;
        color: var(--text);
        font-size: 15px;
        outline: none;
      }

      .chat-form input:focus {
        border-color: var(--accent);
      }

      .chat-form button {
        height: 42px;
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        background: var(--accent);
        color: #07110e;
        cursor: pointer;
        font-weight: 700;
      }

      .chat-form button:disabled {
        cursor: wait;
        opacity: 0.58;
      }

      @media (max-width: 760px) {
        body {
          overflow: auto;
        }

        .app-shell {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(420px, 58vh) minmax(360px, 42vh);
          min-height: 100vh;
          height: auto;
        }

        .chat-panel {
          border-top: 1px solid var(--line);
          border-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="3D lab space">
        <canvas id="scene"></canvas>
        <div id="speechBubble" class="bubble">こんにちは。3D-AI Labのラボ助手です。まずは試したいことを入力してください。</div>
      </section>

      <aside class="chat-panel" aria-label="Lab assistant chat">
        <header class="chat-header">
          <h1>3D-AI Lab</h1>
          <p>入力した内容はFastAPIに送信され、仮応答がログに保存されます。</p>
        </header>

        <section class="simulation-panel" aria-label="simulation controls">
          <div class="simulation-title-row">
            <h2 id="simulationTitle">gravity_ball</h2>
            <select id="simulationSelect" aria-label="シミュレーション選択">
              <option value="gravity_ball" selected>gravity_ball</option>
              <option value="maze_agent">maze_agent</option>
            </select>
          </div>
          <div id="gravityParams" class="parameter-grid">
            <div class="field">
              <label for="gravityInput">重力</label>
              <input id="gravityInput" type="number" min="0.1" max="50" step="0.1" value="9.8" />
            </div>
            <div class="field">
              <label for="heightInput">初期高さ</label>
              <input id="heightInput" type="number" min="0.6" max="12" step="0.1" value="5.0" />
            </div>
            <div class="field">
              <label for="bounceInput">反発係数</label>
              <input id="bounceInput" type="number" min="0" max="0.98" step="0.01" value="0.72" />
            </div>
          </div>
          <div id="mazeParams" class="maze-controls" hidden>
            <div class="simulation-note">
              固定迷路またはランダム迷路を軽量探索で解きます。現時点では強化学習ではなく、スタートからゴールまでの経路を3D再生します。
            </div>
            <label class="toggle-row" for="mazeRandomInput">
              <input id="mazeRandomInput" type="checkbox" />
              ランダム迷路を生成
            </label>
            <div class="parameter-grid">
              <div class="field">
                <label for="mazeSizeInput">迷路サイズ</label>
                <select id="mazeSizeInput">
                  <option value="7" selected>7x7</option>
                  <option value="9">9x9</option>
                  <option value="11">11x11</option>
                </select>
              </div>
              <div class="field">
                <label for="mazeDensityInput">壁の多さ</label>
                <input id="mazeDensityInput" type="number" min="0.05" max="0.55" step="0.05" value="0.32" />
              </div>
              <div class="field">
                <label for="mazeSeedInput">シード</label>
                <input id="mazeSeedInput" type="number" min="1" max="999999" step="1" placeholder="空なら毎回変更" />
              </div>
            </div>
          </div>
          <div class="field">
            <label for="speedSelect">再生速度</label>
            <select id="speedSelect">
              <option value="0.5">0.5x</option>
              <option value="1" selected>1x</option>
              <option value="2">2x</option>
              <option value="4">4x</option>
            </select>
          </div>
          <button id="runSimulationButton" class="run-button" type="button">実行</button>
          <div class="simulation-actions">
            <button id="playPauseButton" type="button">再生</button>
            <button id="resetSimulationButton" type="button">リセット</button>
            <button id="stepSimulationButton" type="button">ステップ</button>
            <button id="loadResultButton" type="button">読込</button>
          </div>
          <div id="simulationStatus" class="simulation-status">まだシミュレーション結果は読み込まれていません。</div>
        </section>

        <div id="chatLog" class="chat-log" aria-live="polite"></div>

        <form id="chatForm" class="chat-form">
          <input
            id="messageInput"
            name="message"
            type="text"
            autocomplete="off"
            placeholder="例: 迷路を進むエージェントを作りたい"
            maxlength="2000"
            required
          />
          <button id="sendButton" type="submit">送信</button>
        </form>
      </aside>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
